<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wate-AI</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:#050816;
      color:#fff;
    }
    .bg{
      position:fixed;
      inset:0;
      z-index:-1;
      background:
      radial-gradient(circle at 20% 20%,rgba(0,183,255,.18),transparent 30%),
      radial-gradient(circle at 80% 30%,rgba(140,82,255,.18),transparent 30%);
    }
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:22px 8%;
      background:rgba(5,8,22,.65);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08);
      position:sticky;
      top:0;
    }
    .logo{
      font-size:28px;
      font-weight:700;
      color:#6ee7ff;
    }
    .btn{
      background:#0ea5e9;
      border:none;
      color:#fff;
      padding:12px 22px;
      border-radius:14px;
      cursor:pointer;
      box-shadow:0 0 25px rgba(14,165,233,.45);
      transition:.2s;
    }
    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 0 35px rgba(14,165,233,.7);
    }
    section{padding:80px 8%}
    h1{
      margin:0 0 20px;
      font-size:58px;
      background:linear-gradient(90deg,#fff,#8be9ff,#c4b5fd);
      -webkit-background-clip:text;
      color:transparent;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:30px;
    }
    .card{
      background:rgba(15,23,42,.75);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:24px;
      backdrop-filter:blur(10px);
    }
    footer{
      padding:30px 8%;
      color:#94a3b8;
      border-top:1px solid rgba(255,255,255,.06);
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <header>
    <div class="logo">◈ Wate-AI</div>
    <button class="btn" onclick="alert('联系QQ：2735262117')">立即体验</button>
  </header>

  <section>
    <p>AI 核心芯片识别引擎</p>

    <div style="margin-top:28px">
      <button class="btn" onclick="alert('购买请联系QQ：2735262117')">立即购买</button>
    </div>
  </section>

  <section>
    <h2>套餐价格</h2>
    <div class="cards">
      <div class="card"><h3>体验卡</h3><p>¥35 / 天</p></div>
      <div class="card"><h3>进阶卡</h3><p>¥140 / 周</p></div>
      <div class="card"><h3>专业卡</h3><p>¥280 / 月</p></div>
    </div>
  </section>

  <section>
    <h2>下载与激活</h2>
    <div class="cards">
      <div class="card">
        <h3>客户端下载</h3>
        <p>Windows x64 Client v2.8.1</p>
        <button class="btn" onclick="alert('下载请联系QQ：2735262117')">立即下载</button>
      </div>
      <div class="card">
        <h3>激活授权</h3>
        <p>输入授权码开通会员</p>
        <button class="btn" onclick="alert('激活请联系QQ：2735262117')">立即激活</button>
      </div>
    </div>
  </section>

  <footer>
    © 2026 Wate-AI · All Rights Reserved
  </footer>
</body>
</html>
